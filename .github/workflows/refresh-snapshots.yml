name: Refresh DOAJ snapshots

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-doaj-snapshots
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      DOAJ_API_KEY: ${{ secrets.DOAJ_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Refresh snapshot data
        env:
          DOAJ_DUMP_TOKEN: ${{ secrets.DOAJ_DUMP_TOKEN }}
          DOAJ_DUMP_AUTH_HEADER: ${{ secrets.DOAJ_DUMP_AUTH_HEADER }}
          DOAJ_DUMP_AUTH_SCHEME: ${{ secrets.DOAJ_DUMP_AUTH_SCHEME }}
          DOAJ_DUMP_JOURNAL_URL: ${{ secrets.DOAJ_DUMP_JOURNAL_URL }}
          DOAJ_DUMP_ARTICLE_URL: ${{ secrets.DOAJ_DUMP_ARTICLE_URL }}
        run: PYTHONPATH=src python scripts/refresh_snapshots.py

      - name: Refresh statistics data
        run: PYTHONPATH=src python scripts/refresh_statistics.py

      - name: Validate static contracts
        run: PYTHONPATH=src python scripts/validate_static_data.py

      - name: Commit and push changes
        run: |
          if git status --short | grep -qE 'docs/data'; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/data
            git commit -m "chore: refresh DOAJ snapshot and statistics data" || exit 0
            git push
          else
            echo "No data changes to commit."
          fi
