name: Validate and build static dashboard

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -p "test_*.py" -v

      - name: Validate static contracts
        run: PYTHONPATH=src python scripts/validate_static_data.py

