name: Manual quality benchmark

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run live quality benchmark
        run: npm run benchmark:quality

      - name: Upload benchmark reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-benchmark-report
          path: output/quality/
